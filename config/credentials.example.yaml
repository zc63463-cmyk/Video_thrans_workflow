# Platform cookie/token configuration template.
# Copy this file to config/credentials.yaml when local credentials are needed.
# The real config file is ignored by git.
#
# yt-dlp expects Mozilla/Netscape-format cookies files for --cookies.
# Prefer browser-exported cookies.txt / netscape.txt files.

bilibili:
  cookies_file: "config/cookies/bilibili_netscape.txt"
  favorite_url: "https://space.bilibili.com/<your_uid>/favlist?fid=<favorite_id>&ftype=create"

youtube:
  cookies_file: "config/cookies/youtube_cookies.txt"
  playlist_id: ""

whisper:
  provider: "faster-whisper"  # faster-whisper, native, or auto
  model: "small"              # tiny/base/small/medium/large-v3
  language: "zh"              # zh/en/ja, or auto/null for auto detection
  device: "cpu"               # cpu or cuda
